<body>
    <div class="caixa-centro">
        <div class="lado-esc">
        <h1>Configurar Nova Turma</h1>
        <hr class="divisor">

        
        
        
        <form action="" method="POST">
            <div class="nome-da-turma">
                <label for="nome-da-turma">Nome da Turma</label>
                <input type="text" id="nome-da-turma" name="nome-da-turma" class="btn" placeholder="Ex: 9º Ano A">
            </div>

            <div class="codigo-da-turma">
                <label for="codigo-da-turma">Código de Acesso</label>
                <input type="password" id="codigo-da-turma" name="codigo-da-turma" class="btn" placeholder="Defina o codigo de acesso">
            </div>

            <div class="curso-da-turma">
                <label for="curso-da-turma">Curso / Série</label>
                <input type="text" id="curso-da-turma" name="curso-da-turma" class="btn" placeholder="Ex: 3º Ano Ensino Médio">
            </div>

            <div class="periodo-da-turma">
                <label for="periodo-da-turma">Período / Turno</label>
                <input type="text" id="periodo-da-turma" name="periodo-da-turma" class="btn" placeholder="Ex: Matutino ou Noturno">
            </div>
            <br>
                <div class="enviar-turma"><button type="submit" class="btn--enviar">Criar Turma</button></div>
        </form>
        </div>
        <div class="placeholder">
            <h3>Insira Foto da Turma</h3>
        </div>
    </div>
</body>
